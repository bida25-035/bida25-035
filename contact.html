<style>
     body {
          font-family: Arial, sans-serif;

    text-area, input {
                      width: 100px;
                      padding: 10px;
                      margin-top: 5px;
                      border:1px solid #ccc;
                      border-radius: 4px;
					  font-color: black;

   text-area {

 .clear-btn {
